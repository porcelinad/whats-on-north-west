<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1E2B26">
<title>North West What's On</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --mist:#ECEFE9; --ink:#1E2B26; --ink-soft:#54645D;
    --ember:#B8481C; --heather:#6F5B92;
    --line:#C7CDC2; --stub:#FFFFFF;
    --display:"Barlow Condensed",sans-serif;
    --body:"Atkinson Hyperlegible",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--mist);color:var(--ink);font-family:var(--body);
       font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px 80px}

  header{padding:22px 0 10px;border-bottom:3px solid var(--ink)}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(34px,9vw,46px);
     letter-spacing:.02em;text-transform:uppercase;line-height:.95}
  h1 span{color:var(--ember)}
  .updated{font-size:13px;color:var(--ink-soft);margin-top:6px}

  .controls{position:sticky;top:0;background:var(--mist);z-index:5;
            padding:10px 0 12px;border-bottom:1px solid var(--line)}
  .date-filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;
         scrollbar-width:none;justify-content:center}
  .date-filters::-webkit-scrollbar{display:none}
  .extra-filters{display:flex;justify-content:center;margin-bottom:8px}
  .chip{font-family:var(--display);font-weight:600;font-size:14px;
        text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;
        border:1.5px solid var(--ink);border-radius:999px;background:transparent;
        color:var(--ink);padding:6px 14px;cursor:pointer;flex:0 0 auto;
        transition:background .15s,color .15s}
  .chip[aria-pressed="true"]{background:var(--ember);border-color:var(--ember);color:#fff}
  .custom-dates{display:flex;gap:8px;margin-bottom:8px}
  .custom-dates[hidden]{display:none}
  .custom-dates input[type="date"]{font:inherit;font-size:14px;flex:1 1 0;
        min-width:0;border:1.5px solid var(--ink);border-radius:8px;
        padding:6px 10px;background:var(--stub);color:var(--ink)}
  .date-error{font-size:13px;color:var(--ember);font-weight:700;margin:-4px 0 8px}
  .filters{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .filter-select{font-family:var(--display);font-weight:600;font-size:14px;
        text-transform:uppercase;letter-spacing:.04em;
        border:1.5px solid var(--ink);border-radius:8px;background:var(--stub);
        color:var(--ink);padding:7px 26px 7px 12px;cursor:pointer;
        flex:1 1 0;min-width:90px;
        -webkit-appearance:none;appearance:none;
        background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0L5 6L10 0Z" fill="%231E2B26"/></svg>');
        background-repeat:no-repeat;background-position:right 10px center}
  .filter-select:focus{outline:2px solid var(--ember);outline-offset:1px}
  #search{width:100%;padding:9px 12px;font:inherit;font-size:15px;margin-bottom:10px;
          border:1.5px solid var(--line);border-radius:8px;background:var(--stub);
          color:var(--ink)}
  #search:focus{outline:2px solid var(--ember);outline-offset:1px}

  .month{font-family:var(--display);font-weight:700;font-size:22px;
         text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);
         display:flex;align-items:center;gap:12px;margin:26px 0 10px}
  .month::after{content:"";flex:1;height:1px;background:var(--line)}

  .event{display:flex;gap:0;background:var(--stub);border-radius:10px;
         margin-bottom:10px;overflow:hidden;text-decoration:none;
         border:1px solid var(--line)}
  .event:active{transform:scale(.995)}
  .stub{flex:0 0 74px;display:flex;flex-direction:column;align-items:center;
        justify-content:center;padding:12px 6px;
        border-right:2px dashed var(--line);position:relative;
        font-family:var(--display);text-transform:uppercase;text-align:center}
  /* punched notches on the perforation, like a torn ticket */
  .stub::before,.stub::after{content:"";position:absolute;right:-8px;width:14px;
        height:14px;border-radius:50%;background:var(--mist);
        border:1px solid var(--line)}
  .stub::before{top:-8px}
  .stub::after{bottom:-8px}
  .dow{font-size:13px;font-weight:600;letter-spacing:.15em;color:var(--ink-soft)}
  .day{font-size:30px;font-weight:700;line-height:1;margin:2px 0}
  .range{font-size:11px;color:var(--ink-soft);letter-spacing:.05em}
  .info{padding:12px 14px;min-width:0;flex:1}
  .title{font-weight:700;font-size:16.5px;line-height:1.25}
  .meta{font-size:13.5px;color:var(--ink-soft);margin-top:4px}
  .meta b{font-weight:700;color:var(--ink)}
  .tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tag{font-size:11.5px;letter-spacing:.04em;color:var(--heather);
       border:1px solid currentColor;border-radius:4px;padding:1px 6px}
  .new{font-family:var(--display);font-weight:700;font-size:12px;
       letter-spacing:.1em;background:var(--ember);color:#fff;
       border-radius:4px;padding:2px 7px;text-transform:uppercase}

  .empty,.error{padding:40px 10px;text-align:center;color:var(--ink-soft)}
  .warn{display:block;margin-top:10px;padding:8px 12px;font-size:14px;
        font-weight:700;color:#fff;background:var(--ember);border-radius:6px}
  footer{margin-top:34px;font-size:12.5px;color:var(--ink-soft);
         border-top:1px solid var(--line);padding-top:12px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>North West<br>What's <span>On</span></h1>
    <p class="updated" id="updated">Loading…</p>
  </header>

  <div class="controls">
    <div class="filters">
      <select id="countyFilter" class="filter-select" aria-label="Filter by county"></select>
      <select id="locationFilter" class="filter-select" aria-label="Filter by location"></select>
      <select id="venueFilter" class="filter-select" aria-label="Filter by venue"></select>
      <select id="genreFilter" class="filter-select" aria-label="Filter by genre"></select>
    </div>
    <input id="search" type="search" placeholder="Search by event, venue or genre…" aria-label="Search by event, venue or genre">
    <div class="date-filters" id="dateFilters" role="group" aria-label="Filter by date"></div>
    <div class="custom-dates" id="customDates" hidden>
      <input type="date" id="dateFrom" aria-label="From date">
      <input type="date" id="dateTo" aria-label="To date">
    </div>
    <p class="date-error" id="dateError" hidden></p>
    <div class="extra-filters" id="shapeFilters" role="group" aria-label="Filter by recurrence"></div>
  </div>

  <main id="list"></main>

  <footer>
    Pulled daily from each venue's own website. Tap an event for details
    and booking on the venue's site.
  </footer>
</div>

<script>
const MONTHS=["January","February","March","April","May","June","July",
              "August","September","October","November","December"];
const DOWS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let EVENTS=[], countySel="All", venueSel="All", genreSel="All", locationSel="All", query="";
let dateSel=null, customFrom="", customTo="", shapeSel=null;

function normalizeTown(t){
  return t==="Donegal" ? "Donegal Town" : t;
}

function addDays(iso,n){
  const [y,m,d]=iso.split("-").map(Number);
  return new Date(Date.UTC(y,m-1,d+n)).toISOString().slice(0,10);
}
function weekdayOf(iso){
  const [y,m,d]=iso.split("-").map(Number);
  return new Date(Date.UTC(y,m-1,d)).getUTCDay();
}
function todayISO(){
  const parts=new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Dublin",
    year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date());
  const get=t=>parts.find(p=>p.type===t).value;
  return `${get("year")}-${get("month")}-${get("day")}`;
}
function weekendRange(today){
  const wd=weekdayOf(today);
  if(wd===6) return {from:today, to:addDays(today,1)};
  if(wd===0) return {from:today, to:today};
  const sat=addDays(today,6-wd);
  return {from:sat, to:addDays(sat,1)};
}
const TODAY_ISO=todayISO(), TOMORROW_ISO=addDays(TODAY_ISO,1);

const el=(t,c,txt)=>{const n=document.createElement(t);
  if(c)n.className=c; if(txt!==undefined)n.textContent=txt; return n};

function fmt(iso){const d=new Date(iso+"T12:00:00");
  return {dow:DOWS[d.getDay()], day:d.getDate(),
          mon:MONTHS[d.getMonth()].slice(0,3), month:MONTHS[d.getMonth()],
          key:iso.slice(0,7)}}

function isNew(ev,gen){
  const first=new Date(ev.first_seen), g=new Date(gen);
  return (g-first)/86400000 <= 7;
}

function fmtUpdated(iso){
  try{
    const d=new Date(iso);
    if(isNaN(d)) return iso;
    return d.toLocaleString("en-IE",{day:"numeric",month:"short",
      hour:"2-digit",minute:"2-digit",timeZone:"Europe/Dublin"});
  }catch(e){ return iso; }
}

function matchesShape(ev){
  if(shapeSel==="single") return !ev.end_date;
  if(shapeSel==="recurring") return !!ev.end_date;
  return true;
}

function matchesGenre(ev){
  if(genreSel==="All") return true;
  if(genreSel==="Not listed") return !ev.category;
  return (ev.category||"").split(", ").includes(genreSel);
}

function customRangeError(){
  if(dateSel!=="custom") return null;
  if(customFrom && customTo && customTo<customFrom)
    return "End date can't be before the start date.";
  if(customTo && customTo<TODAY_ISO)
    return "That date range is in the past.";
  return null;
}

function matchesDate(ev){
  if(!dateSel) return true;
  const start=ev.date, end=ev.end_date||ev.date;
  let from, to;
  if(dateSel==="today"){ from=to=TODAY_ISO; }
  else if(dateSel==="tomorrow"){ from=to=TOMORROW_ISO; }
  else if(dateSel==="weekend"){ const w=weekendRange(TODAY_ISO); from=w.from; to=w.to; }
  else if(dateSel==="custom"){
    if(!customFrom && !customTo) return true;
    from=customFrom||"0000-01-01"; to=customTo||"9999-12-31";
  }
  return start<=to && end>=from;
}

function render(gen){
  const list=document.getElementById("list");
  list.textContent="";
  const errBox=document.getElementById("dateError");
  const rangeErr=customRangeError();
  errBox.hidden=!rangeErr;
  if(rangeErr) errBox.textContent=rangeErr;
  const q=query.trim().toLowerCase();
  const shown=rangeErr ? [] : EVENTS.filter(e=>
    (countySel==="All"||e.county===countySel) &&
    (locationSel==="All"||normalizeTown(e.town)===locationSel) &&
    (venueSel==="All"||e.venue===venueSel) &&
    matchesGenre(e) && matchesDate(e) && matchesShape(e) &&
    (!q || (e.title+" "+e.venue+" "+(e.category||"")+" "+normalizeTown(e.town))
            .toLowerCase().includes(q)));
  if(!shown.length){
    list.append(el("p","empty","No events match. Try clearing the filters."));
    return;
  }
  let lastMonth="";
  for(const ev of shown){
    const f=fmt(ev.date);
    if(f.key!==lastMonth){
      lastMonth=f.key;
      list.append(el("h2","month",f.month+" "+ev.date.slice(0,4)));
    }
    const a=el("a","event"); a.href=ev.url||ev.booking_url||"#";
    a.target="_blank"; a.rel="noopener";

    const stub=el("div","stub");
    stub.append(el("span","dow",f.dow), el("span","day",f.day),
                el("span","dow",f.mon));
    if(ev.end_date){const e2=fmt(ev.end_date);
      stub.append(el("span","range","to "+e2.day+" "+e2.mon));}
    const info=el("div","info");
    info.append(el("p","title",ev.title));
    const meta=el("p","meta");
    meta.innerHTML="<b>"+ev.venue+"</b> · "+normalizeTown(ev.town)+(ev.time?" · "+ev.time:"");
    info.append(meta);
    const tags=el("div","tags");
    if(isNew(ev,gen)) tags.append(el("span","new","New"));
    if(ev.category) ev.category.split(", ").forEach(c=>
      tags.append(el("span","tag",c)));
    if(tags.childNodes.length) info.append(tags);
    a.append(stub,info); list.append(a);
  }
}

function setOptions(select, values, allLabel, current){
  select.textContent="";
  const opt=el("option","","All "+allLabel); opt.value="All";
  select.append(opt);
  values.forEach(v=>{
    const o=el("option","",v.label!==undefined?v.label:v);
    o.value=v.value!==undefined?v.value:v;
    select.append(o);
  });
  select.value=[...select.options].some(o=>o.value===current) ? current : "All";
  return select.value;
}

function buildCountyOptions(){
  const counties=[...new Set(EVENTS.map(e=>e.county))].sort((a,b)=>{
    if(a==="Donegal") return -1;
    if(b==="Donegal") return 1;
    return a.localeCompare(b);
  });
  countySel=setOptions(document.getElementById("countyFilter"), counties,
                       "Counties", countySel);
}

function buildLocationOptions(){
  const scoped=countySel==="All"?EVENTS:EVENTS.filter(e=>e.county===countySel);
  const locations=[...new Set(scoped.map(e=>normalizeTown(e.town)))].sort();
  locationSel=setOptions(document.getElementById("locationFilter"), locations,
                         "Locations", locationSel);
}

function buildVenueOptions(){
  let scoped=EVENTS;
  if(countySel!=="All") scoped=scoped.filter(e=>e.county===countySel);
  if(locationSel!=="All") scoped=scoped.filter(e=>normalizeTown(e.town)===locationSel);
  const venues=[...new Set(scoped.map(e=>e.venue))].sort();
  venueSel=setOptions(document.getElementById("venueFilter"), venues,
                      "Venues", venueSel);
}

function buildGenreOptions(){
  const genres=new Set();
  let hasUnlisted=false;
  EVENTS.forEach(e=>{
    if(e.category) e.category.split(", ").forEach(c=>genres.add(c));
    else hasUnlisted=true;
  });
  const list=[...genres].sort();
  if(hasUnlisted) list.push("Not listed");
  genreSel=setOptions(document.getElementById("genreFilter"), list,
                      "Genres", genreSel);
}

function buildDateFilters(){
  const box=document.getElementById("dateFilters");
  const customBox=document.getElementById("customDates");
  const opts=[["today","Today"],["tomorrow","Tomorrow"],
              ["weekend","This weekend"],["custom","Custom"]];
  opts.forEach(([val,label])=>{
    const b=el("button","chip",label);
    b.setAttribute("aria-pressed",val===dateSel);
    b.onclick=()=>{
      dateSel = (dateSel===val) ? null : val;
      box.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
      if(dateSel) b.setAttribute("aria-pressed","true");
      customBox.hidden = dateSel!=="custom";
      render(GEN);
    };
    box.append(b);
  });
}

function buildShapeFilters(){
  const box=document.getElementById("shapeFilters");
  const opts=[["single","Single date"],["recurring","Recurring"]];
  opts.forEach(([val,label])=>{
    const b=el("button","chip",label);
    b.setAttribute("aria-pressed",val===shapeSel);
    b.onclick=()=>{
      shapeSel = (shapeSel===val) ? null : val;
      box.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
      if(shapeSel) b.setAttribute("aria-pressed","true");
      render(GEN);
    };
    box.append(b);
  });
}

let GEN="";
fetch("events.json?t="+Date.now())
 .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
 .then(data=>{
   EVENTS=data.events||[]; GEN=data.generated_at||"";
   const u=document.getElementById("updated");
   u.textContent=EVENTS.length+" upcoming events · updated "+fmtUpdated(GEN);
   if((data.failed_sources||[]).length){
     data.failed_sources.forEach(name=>{
       u.after(el("p","warn","⚠ Error loading "+name));
     });
   }
   buildDateFilters(); buildShapeFilters();
   buildCountyOptions(); buildLocationOptions(); buildVenueOptions();
   buildGenreOptions(); render(GEN);
   document.getElementById("search").addEventListener("input",e=>{
     query=e.target.value; render(GEN)});
   document.getElementById("dateFrom").addEventListener("change",e=>{
     customFrom=e.target.value; render(GEN)});
   document.getElementById("dateTo").addEventListener("change",e=>{
     customTo=e.target.value; render(GEN)});
   document.getElementById("countyFilter").addEventListener("change",e=>{
     countySel=e.target.value; venueSel="All"; locationSel="All";
     buildLocationOptions(); buildVenueOptions(); render(GEN)});
   document.getElementById("locationFilter").addEventListener("change",e=>{
     locationSel=e.target.value; venueSel="All";
     buildVenueOptions(); render(GEN)});
   document.getElementById("venueFilter").addEventListener("change",e=>{
     venueSel=e.target.value; render(GEN)});
   document.getElementById("genreFilter").addEventListener("change",e=>{
     genreSel=e.target.value; render(GEN)});
 })
 .catch(err=>{
   console.error("Failed to load or render events:", err);
   document.getElementById("updated").textContent="";
   document.getElementById("list").append(el("p","error",
     "Something went wrong showing events. Check the browser console "+
     "for details, or try refreshing."));
 });
</script>
</body>
</html>
